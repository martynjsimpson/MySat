[platformio]
src_dir = satellite-firmware/src
include_dir = satellite-firmware/include

[env:mkrwifi1010]
platform = atmelsam
board = mkrwifi1010
framework = arduino
monitor_speed = 115200

lib_deps =
    arduino-libraries/RTCZero
    arduino-libraries/Arduino_BQ24195
    arduino-libraries/Arduino_MKRGPS
    arduino-libraries/WiFiNINA
